<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DES Visualizer</title>
<style>
:root{ 
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2128; --bg4:#21262d;
  --bd:#21262d; --bd2:#30363d;
  --t:#e6edf3; --sub:#8b949e; --dim:#484f58; --muted:#6e7681;
  --blue:#58a6ff; --green:#3fb950; --yel:#d29922;
  --red:#f85149; --purp:#bc8cff; --cyan:#56d364;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:'SF Mono',ui-monospace,monospace;font-size:13px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* HEADER */
header{padding:0 28px;height:52px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--bg2);position:sticky;top:0;z-index:200}
.h-title{font-size:13px;letter-spacing:5px;color:var(--blue);font-weight:400}
.h-ref{font-size:11px;color:var(--sub);border:1px solid var(--bd2);padding:5px 14px;border-radius:5px;transition:.15s}
.h-ref:hover{color:var(--blue);border-color:var(--blue);text-decoration:none}

/* WRAP */
.wrap{max-width:1240px;margin:0 auto;padding:24px 28px}

/* INPUT */
.ip{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:20px 24px;margin-bottom:18px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:14px}
.fl{font-size:10px;letter-spacing:2px;color:var(--sub);margin-bottom:6px;text-transform:uppercase}
input[type=text]{width:100%;background:var(--bg);border:1px solid var(--bd2);color:var(--t);padding:9px 13px;font-family:inherit;font-size:14px;border-radius:5px;outline:none;letter-spacing:1px;transition:.15s}
input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.12)}
.fr{display:flex;gap:4px;margin-top:6px}
button{background:var(--bg3);border:1px solid var(--bd);color:var(--sub);padding:4px 11px;font-family:inherit;font-size:11px;border-radius:4px;cursor:pointer;transition:.12s;letter-spacing:.5px}
button:hover{color:var(--t);border-color:var(--bd2)}
button.on{background:rgba(88,166,255,.12);color:var(--blue);border-color:var(--blue)}
.ar{display:flex;gap:8px;align-items:center}
.btn-enc{background:#1a5fb4;border-color:#1a5fb4;color:#fff;padding:8px 22px;font-size:12px;border-radius:5px;letter-spacing:1px}
.btn-enc:hover{background:#1f6feb;border-color:#1f6feb}
.err{color:var(--red);font-size:12px;padding:4px 0}

/* RESULT BAR */
.rb-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.rb{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:14px 16px}
.rb-l{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.rb-v{font-size:15px;letter-spacing:2px;word-break:break-all;color:var(--green)}
.rb-v.rk{color:var(--yel)}.rb-v.rc{color:var(--blue)}

/* TABS */
.tab-bar{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--bd)}
.tab{padding:10px 16px;font-size:11px;letter-spacing:1px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;border-radius:0;transition:.12s;text-transform:uppercase}
.tab:hover:not(.on){color:var(--t)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.pane{display:none;background:var(--bg2);border:1px solid var(--bd);border-top:none;padding:28px;border-radius:0 0 8px 8px}
.pane.on{display:block}

/* SECTION HEADERS */
.sh{font-size:10px;letter-spacing:2px;color:var(--sub);margin:22px 0 10px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sh:first-child{margin-top:0}
.sh::after{content:'';flex:1;height:1px;background:var(--bd)}
.note{color:var(--muted);font-size:12px;margin-bottom:16px;line-height:1.8;padding:10px 14px;background:var(--bg);border-left:3px solid var(--bd2);border-radius:0 4px 4px 0}

/* PERM GRID */
.pgrid{display:inline-flex;flex-direction:column;gap:2px;margin:8px 0 18px}
.pgrid-row{display:flex;gap:2px}
.pc{width:33px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--bd);font-size:11px;color:var(--dim);border-radius:3px;transition:.12s}
.pc:hover{border-color:var(--blue);color:var(--blue)}
.pc.hi{background:rgba(88,166,255,.1);border-color:var(--blue);color:var(--blue)}

/* DATA ROW */
.drow{display:grid;grid-template-columns:200px 170px 1fr;gap:14px;padding:10px 0;border-bottom:1px solid var(--bd);align-items:start}
.drow:last-child{border:none}
.dl{color:var(--sub);font-size:12px;padding-top:2px}
.dh{letter-spacing:2px;word-break:break-all;font-size:13px}
.db{color:var(--dim);letter-spacing:1.5px;word-break:break-all;font-size:11px;line-height:2}
.b1{color:var(--green)}

/* GENERIC TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{color:var(--sub);font-size:10px;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid var(--bd);text-align:left;background:var(--bg3);white-space:nowrap;text-transform:uppercase}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(33,38,45,.6);vertical-align:top}
.tbl tbody tr:hover td{background:var(--bg3);cursor:pointer}
.tbl tbody tr.sel td{background:rgba(88,166,255,.07)}
.tbl tbody tr.sel td:first-child{border-left:2px solid var(--blue);padding-left:8px}

/* ─── EXPANDABLE CARDS (used by Key Schedule + All Rounds) ─── */
.cards{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:7px;overflow:hidden}
.card-head{display:grid;gap:0;background:var(--bg3);padding:10px 16px;align-items:center;cursor:pointer;user-select:none;transition:.12s}
.card-head:hover{background:rgba(88,166,255,.06)}
.card-head.open-head{border-bottom:1px solid var(--bd);background:rgba(88,166,255,.06)}
.card-body{display:none;padding:18px 20px}
.card-body.open{display:block}

/* KS card head columns */
.ks-head{grid-template-columns:52px 160px 160px 1fr 1fr}
.ks-rn{color:var(--blue);font-size:13px;font-weight:600}
.cd-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-bottom:3px;text-transform:uppercase}
.cd-val{font-size:12px;letter-spacing:1px;color:var(--yel);word-break:break-all}
.cd-sub{font-size:13px;letter-spacing:2px;color:var(--yel)}
.cd-arrow{color:var(--dim);font-size:11px;margin-left:auto;transition:.2s}
.card-head.open-head .cd-arrow{transform:rotate(180deg)}

/* ROUND card head columns */
.rnd-head{grid-template-columns:44px 1fr 1fr 1fr 1fr 1fr 20px}
.rnd-rn{color:var(--blue);font-size:12px;font-weight:600}
.rnd-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-bottom:2px;text-transform:uppercase}
.rnd-val{font-size:12px;letter-spacing:1px;word-break:break-all}

/* STEP BLOCK */
.step{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.step:last-child{margin-bottom:0}
.step-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.step-tag{font-size:9px;letter-spacing:2px;padding:3px 9px;border-radius:10px;font-weight:600;text-transform:uppercase;border:1px solid}
.tag-blue{background:rgba(88,166,255,.12);color:var(--blue);border-color:rgba(88,166,255,.3)}
.tag-yel{background:rgba(210,153,34,.12);color:var(--yel);border-color:rgba(210,153,34,.3)}
.tag-red{background:rgba(248,81,73,.12);color:var(--red);border-color:rgba(248,81,73,.3)}
.tag-grn{background:rgba(63,185,80,.12);color:var(--green);border-color:rgba(63,185,80,.3)}
.tag-purp{background:rgba(188,140,255,.12);color:var(--purp);border-color:rgba(188,140,255,.3)}
.tag-dim{background:rgba(72,79,88,.2);color:var(--sub);border-color:rgba(72,79,88,.4)}
.step-hd-title{color:var(--sub);font-size:11px;letter-spacing:1px}
.sr{display:flex;gap:12px;margin-bottom:6px;align-items:baseline}
.sr:last-child{margin-bottom:0}
.sk{color:var(--muted);min-width:150px;flex-shrink:0;font-size:11px}
.sv{word-break:break-all;line-height:1.8}

/* XOR VISUAL */
.xor-vis{font-size:12px}
.xv-row{display:flex;align-items:center;gap:0;margin-bottom:2px}
.xv-lbl{width:90px;flex-shrink:0;color:var(--muted);font-size:11px}
.xv-bits{display:flex;flex-wrap:wrap;gap:0;font-size:12px;line-height:2}
.xvb{width:13px;text-align:center}
.xvb.v0{color:var(--dim)}.xvb.v1b{color:var(--t)}
.xvb.k0{color:var(--dim)}.xvb.k1{color:var(--yel)}
.xvb.r0{color:var(--dim)}.xvb.r1{color:var(--red)}
.xv-sep{width:6px;display:inline-block;text-align:center;color:var(--bd2)}
.xv-divider{border-top:1px solid var(--bd);margin:3px 0 3px 90px}

/* ═══ S-BOX TABLES ═══ */
/* Reference tab: 2×4 grid of full sbox tables */
.sbox-ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
/* Round detail: 2×4 grid (smaller) */
.sbox-rd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}

.sbox-card{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:12px}
.sbox-card-title{color:var(--yel);font-size:10px;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sbox-io{font-size:11px;margin-bottom:6px;line-height:1.9}
.sbox-io .ob{color:var(--yel);font-weight:600}
.sbox-io .ib{color:var(--blue);font-weight:600}
.sbox-result{margin-top:8px;padding:6px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;display:flex;align-items:center;gap:12px;font-size:12px}
.sbox-result-bits{color:var(--green);font-size:16px;letter-spacing:4px;font-weight:600}

/* S-box lookup table */
.sb-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed}
.sb-tbl th{padding:3px 2px;text-align:center;color:var(--muted);background:var(--bg);font-weight:400;border-bottom:1px solid var(--bd)}
.sb-tbl td{padding:3px 2px;text-align:center;color:var(--dim);border:1px solid rgba(33,38,45,.4)}
.sb-tbl td:hover{background:var(--bg3);color:var(--t);cursor:default}
.sb-tbl .row-hdr{color:var(--yel);background:var(--bg);font-weight:600;border-right:1px solid var(--bd)}
.sb-tbl .hi{background:rgba(88,166,255,.2)!important;color:var(--blue)!important;font-weight:700;border:1px solid rgba(88,166,255,.5)!important}
.sb-tbl .hi-row{background:rgba(63,185,80,.06);color:var(--green)}
.sb-tbl .hi-col{background:rgba(210,153,34,.06);color:var(--yel)}

/* Round detail sbox (compact) */
.sbox-mini .sb-tbl{font-size:9px}
.sbox-mini .sbox-card{padding:8px 10px}

/* 2-col layout */
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* Inline badge */
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;letter-spacing:.5px;border:1px solid}
.badge-blue{background:rgba(88,166,255,.1);color:var(--blue);border-color:rgba(88,166,255,.3)}
.badge-yel{background:rgba(210,153,34,.1);color:var(--yel);border-color:rgba(210,153,34,.3)}
.badge-grn{background:rgba(63,185,80,.1);color:var(--green);border-color:rgba(63,185,80,.3)}

/* colors */
.c1{color:var(--blue)}.c2{color:var(--green)}.c3{color:var(--yel)}.c4{color:var(--red)}.c5{color:var(--purp)}
</style>
</head>

<header>
  <span class="h-title">DES  VISUALIZER</span>
  <a class="h-ref" href="https://csrc.nist.gov/files/pubs/fips/46/final/docs/nbs.fips.46.pdf" target="_blank">NIST FIPS 46 ↗</a>
</header>

<div class="wrap">

<!-- INPUT -->
<div class="ip">
  <div class="ig">
    <div>
      <div class="fl">Plaintext</div>
      <input id="ptIn" type="text" value="0000000000000000">
      <div class="fr" id="ptFmts">
        <button class="on" onclick="setFmt('pt','hex',this)">HEX</button>
        <button onclick="setFmt('pt','txt',this)">TEXT</button>
        <button onclick="setFmt('pt','bin',this)">BIN</button>
        <button onclick="setFmt('pt','dec',this)">DEC</button>
      </div>
    </div>
    <div>
      <div class="fl">Key</div>
      <input id="keyIn" type="text" value="0000000000000000">
      <div class="fr" id="keyFmts">
        <button class="on" onclick="setFmt('key','hex',this)">HEX</button>
        <button onclick="setFmt('key','txt',this)">TEXT</button>
        <button onclick="setFmt('key','bin',this)">BIN</button>
        <button onclick="setFmt('key','dec',this)">DEC</button>
      </div>
    </div>
  </div>
  <div class="ar">
    <button class="btn-enc" onclick="run()">ENCRYPT</button>
    <button onclick="rand()">RANDOM</button>
    <button onclick="loadEx()">EXAMPLE</button>
    <span id="err" class="err"></span>
  </div>
</div>

<div id="results" style="display:none">

<!-- RESULT BAR -->
<div class="rb-bar">
  <div class="rb"><div class="rb-l">Plaintext</div><div class="rb-v" id="r-pt"></div></div>
  <div class="rb"><div class="rb-l">Key</div><div class="rb-v rk" id="r-key"></div></div>
  <div class="rb"><div class="rb-l">Ciphertext</div><div class="rb-v rc" id="r-ct"></div></div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab on" onclick="tab('ip',this)">Initial Perm</button>
  <button class="tab"    onclick="tab('ks',this)">Key Schedule</button>
  <button class="tab"    onclick="tab('et',this)">E-Expansion</button>
  <button class="tab"    onclick="tab('sb',this)">S-Boxes</button>
  <button class="tab"    onclick="tab('pt',this)">P-Permutation</button>
  <button class="tab"    onclick="tab('ar',this)">All Rounds</button>
  <button class="tab"    onclick="tab('fp',this)">Final Perm</button>
</div>

<div id="pane-ip" class="pane on"></div>
<div id="pane-ks" class="pane"></div>
<div id="pane-et" class="pane"></div>
<div id="pane-sb" class="pane"></div>
<div id="pane-pt" class="pane"></div>
<div id="pane-ar" class="pane"></div>
<div id="pane-fp" class="pane"></div>

</div><!-- results -->
</div><!-- wrap -->

// ──────────────────────────────────────────────────────────────
// BIT HELPERS
// ──────────────────────────────────────────────────────────────
function h2b(hex){
  hex=hex.replace(/\s/g,'').toUpperCase();
  if(hex.length!==16)return null;
  var o=[];
  for(var i=0;i<16;i++){var v=parseInt(hex[i],16);if(isNaN(v))return null;o.push((v>>3)&1,(v>>2)&1,(v>>1)&1,v&1);}
  return o;
}
function b2h(b){
  var h='';
  for(var i=0;i<b.length;i+=4)h+=((b[i]<<3)|(b[i+1]<<2)|(b[i+2]<<1)|b[i+3]).toString(16).toUpperCase();
  return h;
}
function bgrp(b,g){var s=b.join(''),o=[];for(var i=0;i<s.length;i+=g)o.push(s.slice(i,i+g));return o.join(' ')}
function cbits(b){return b.map(function(x){return x?'<span class="b1">1</span>':'0';}).join('')}
function pm(b,t){return t.map(function(n){return b[n-1];})}
function xr(a,b){return a.map(function(x,i){return x^b[i];})}
function rl(b,n){return b.slice(n).concat(b.slice(0,n))}
function asb(b48){
  var o=[],d=[];
  for(var i=0;i<8;i++){
    var g=b48.slice(i*6,i*6+6);
    var row=(g[0]<<1)|g[5],col=(g[1]<<3)|(g[2]<<2)|(g[3]<<1)|g[4];
    var v=SB[i][row*16+col];
    o.push((v>>3)&1,(v>>2)&1,(v>>1)&1,v&1);
    d.push({g:g.join(''),b1:g[0],b6:g[5],inner:g.slice(1,5).join(''),row:row,col:col,val:v,bits:v.toString(2).padStart(4,'0')});
  }
  return{out:o,dbg:d};
}

// ──────────────────────────────────────────────────────────────
// FORMAT / PARSE
// ──────────────────────────────────────────────────────────────
var ptFmt='hex',keyFmt='hex';
function parseIn(v,fmt){
  v=v.trim();
  if(fmt==='hex')return h2b(v);
  if(fmt==='txt'){var h='';for(var i=0;i<8;i++)h+=(i<v.length?v.charCodeAt(i):0).toString(16).padStart(2,'0');return h2b(h.toUpperCase());}
  if(fmt==='bin'){v=v.replace(/\s/g,'');if(v.length!==64||/[^01]/.test(v))return null;return v.split('').map(Number);}
  if(fmt==='dec'){try{return h2b(BigInt(v).toString(16).toUpperCase().padStart(16,'0').slice(-16));}catch(e){return null;}}
  return null;
}
function setFmt(f,fmt,btn){document.getElementById(f+'Fmts').querySelectorAll('button').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');if(f==='pt')ptFmt=fmt;else keyFmt=fmt;}
function rand(){
  function rh(){return Array.from({length:16},function(){return '0123456789ABCDEF'[0|Math.random()*16];}).join('');}
  document.getElementById('ptIn').value=rh();document.getElementById('keyIn').value=rh();
  ptFmt='hex';keyFmt='hex';
  ['ptFmts','keyFmts'].forEach(function(id){var c=document.getElementById(id);c.querySelectorAll('button').forEach(function(b){b.classList.remove('on');});c.querySelector('button').classList.add('on');});
  run();
}
function loadEx(){
  document.getElementById('ptIn').value='0000000000000000';document.getElementById('keyIn').value='0000000000000000';
  ptFmt='hex';keyFmt='hex';
  ['ptFmts','keyFmts'].forEach(function(id){var c=document.getElementById(id);c.querySelectorAll('button').forEach(function(b){b.classList.remove('on');});c.querySelector('button').classList.add('on');});
  run();
}

// ──────────────────────────────────────────────────────────────
// DES CORE
// ──────────────────────────────────────────────────────────────
var G=null;
function desEnc(pt,key){
  var ip=pm(pt,IP_T),L=ip.slice(0,32),R=ip.slice(32);
  var pc1=pm(key,PC1_T),C=pc1.slice(0,28),D=pc1.slice(28);
  var sk=[],Cs=[C.slice()],Ds=[D.slice()];
  for(var i=0;i<16;i++){C=rl(C,SHF[i]);D=rl(D,SHF[i]);Cs.push(C.slice());Ds.push(D.slice());sk.push(pm(C.concat(D),PC2_T));}
  var rds=[{n:0,L:L.slice(),R:R.slice(),K:null,eR:null,xored:null,sout:null,sdbg:null,fR:null}];
  for(var i=0;i<16;i++){
    var K=sk[i],eR=pm(R,E_T),xored=xr(eR,K);
    var sb=asb(xored),fR=pm(sb.out,P_T),nR=xr(L,fR);
    L=R.slice();R=nR.slice();
    rds.push({n:i+1,L:L.slice(),R:R.slice(),K:K.slice(),eR:eR.slice(),xored:xored.slice(),sout:sb.out.slice(),sdbg:sb.dbg,fR:fR.slice()});
  }
  var sw=rds[16].R.concat(rds[16].L);
  return{ptBits:pt,keyBits:key,ipOut:ip,pc1:pc1,Cs:Cs,Ds:Ds,sk:sk,rds:rds,sw:sw,ct:pm(sw,FP_T)};
}
function run(){
  document.getElementById('err').textContent='';
  var pt=parseIn(document.getElementById('ptIn').value,ptFmt);
  var key=parseIn(document.getElementById('keyIn').value,keyFmt);
  if(!pt){document.getElementById('err').textContent='Invalid plaintext.';return;}
  if(!key){document.getElementById('err').textContent='Invalid key.';return;}
  G=desEnc(pt,key);
  document.getElementById('r-pt').textContent=b2h(G.ptBits);
  document.getElementById('r-key').textContent=b2h(G.keyBits);
  document.getElementById('r-ct').textContent=b2h(G.ct);
  document.getElementById('results').style.display='block';
  renderIP();renderKS();renderET();renderSB();renderPT();renderAR();renderFP();
}

function drow(lbl,bits,color){
  color=color||'#58a6ff';
  return '<div class="drow"><div class="dl">'+lbl+'</div><div class="dh" style="color:'+color+'">'+b2h(bits)+'</div><div class="db">'+cbits(bits)+'</div></div>';
}
function pgrid(tbl,cols){
  var h='<div class="pgrid">';
  for(var r=0;r<Math.ceil(tbl.length/cols);r++){
    h+='<div class="pgrid-row">';
    for(var c=0;c<cols;c++)h+='<div class="pc">'+tbl[r*cols+c]+'</div>';
    h+='</div>';
  }
  return h+'</div>';
}

// Build S-box HTML table with optional row/col highlight
function sbTable(si,hiR,hiC){
  // si=0..7, hiR/hiC = -1 for no highlight
  var h='<table class="sb-tbl"><thead><tr><th style="width:20px"></th>';
  for(var c=0;c<16;c++)h+='<th class="'+(c===hiC?'hi-col':'')+'">'+c+'</th>';
  h+='</tr></thead><tbody>';
  for(var r=0;r<4;r++){
    h+='<tr><td class="row-hdr '+(r===hiR?'hi-row':'')+'">'+r+'</td>';

      h+='<td class="'+cls+'">'+SB[si][r*16+c]+'</td>';
    }
    h+='</tr>';
  }
  return h+'</tbody></table>';
}

function xorVis(eR,K,xored){
  var rows=[{lbl:'E(R)',arr:eR,c0:'var(--dim)',c1:'var(--t)'},
            {lbl:'K',  arr:K,  c0:'var(--dim)',c1:'var(--yel)'},
            {lbl:'⊕',  arr:xored,c0:'var(--dim)',c1:'var(--red)'}];
  var h='<div class="xor-vis">';
  rows.forEach(function(row,ri){
    h+='<div class="xv-row"><span class="xv-lbl">'+row.lbl+'</span><span class="xv-bits">';

      h+='<span class="xvb" style="color:'+(b?row.c1:row.c0)+'">'+b+'</span>';
    }
    h+='</span></div>';
    if(ri===1)h+='<div class="xv-divider"></div>';

      // ⑤ S-boxes
      '<div class="step"><div class="step-hd"><span class="step-tag tag-yel">⑤ S-Box Substitution  8×6 → 8×4 bits</span><span class="step-hd-title">only non-linear step</span></div>'+
        '<div class="sr" style="margin-bottom:12px;"><span class="sk">XOR input</span><span class="sv c4">'+bgrp(r.xored,6)+'</span></div>'+
        '<div class="sbox-rd-grid">'+
        (function(rr){var s='';rr.sdbg.forEach(function(d,si){s+=sbCardMini(si,d);});return s;})(r)+
        '</div>'+
        '<div class="sr" style="margin-top:12px;"><span class="sk">S-box output  (32-bit)</span><span class="sv c5">'+bgrp(r.sout,4)+'</span></div>'+
      '</div>'+

      // ⑥ P-perm
      '<div class="step"><div class="step-hd"><span class="step-tag tag-purp">⑥ P-Permutation  32 → 32 bits</span></div>'+
        '<div class="sr"><span class="sk">S-box output</span><span class="sv c5">'+bgrp(r.sout,4)+'</span></div>'+
        '<div class="sr"><span class="sk">After P  →  f(R,K)</span><span class="sv c4">'+bgrp(r.fR,4)+'</span></div>'+
      '</div>'+

      // ⑦ Output
      '<div class="step"><div class="step-hd"><span class="step-tag tag-grn">⑦ Round Output</span></div>'+
        '<div class="sr"><span class="sk">L'+(i-1)+'</span><span class="sv c1">'+b2h(prev.L)+'</span></div>'+
        '<div class="sr"><span class="sk">f(R'+(i-1)+', K'+i+')</span><span class="sv c4">'+b2h(r.fR)+'</span></div>'+
        '<div style="border-top:1px solid var(--bd);margin:10px 0"></div>'+
        '<div class="sr"><span class="sk">L'+i+' = R'+(i-1)+'</span><span class="sv c1" style="font-size:15px;letter-spacing:2px;">'+b2h(r.L)+'</span></div>'+
        '<div class="sr"><span class="sk">R'+i+' = L'+(i-1)+' ⊕ f</span><span class="sv c2" style="font-size:15px;letter-spacing:2px;">'+b2h(r.R)+'</span></div>'+
      '</div>'+

      '</div>'+// card-body
      '</div>';// card
  }
  html+='</div>';
  document.getElementById('pane-ar').innerHTML=html;
}

// ──────────────────────────────────────────────────────────────
// FINAL PERMUTATION
// ──────────────────────────────────────────────────────────────
function renderFP(){
  var g=G,r=g.rds;
  document.getElementById('pane-fp').innerHTML=
    '<div class="note">After round 16, the halves are SWAPPED — R16 is placed before L16. Then IP⁻¹ (inverse initial permutation) produces the final ciphertext.</div>'+
    '<div class="sh">IP⁻¹ Table  (8 × 8)</div>'+pgrid(FP_T,8)+
    '<div class="sh">Worked Values</div>'+
    drow('L16',r[16].L,'#58a6ff')+
    drow('R16',r[16].R,'#3fb950')+
    drow('R16 ‖ L16  (swapped, pre-IP⁻¹)',g.sw)+
    drow('Ciphertext = IP⁻¹(…)',g.ct,'#d29922');
}

// ──────────────────────────────────────────────────────────────
// TABS + TOGGLE
// ──────────────────────────────────────────────────────────────
function tab(name,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('pane-'+name).classList.add('on');
  if(btn)btn.classList.add('on');
}
function tog(id,head){
  var b=document.getElementById(id);
  var open=b.classList.toggle('open');
  if(head)head.classList.toggle('open-head',open);
}

loadEx();
</script>
